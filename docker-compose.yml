version: '3.8'

services:
  db:
    image: postgres:16
    container_name: librarydb
    environment:
      POSTGRES_DB: librarydb
      POSTGRES_USER: libraryuser
      POSTGRES_PASSWORD: library123
    ports:
      - "5434:5432"
    volumes:
      - library_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U libraryuser -d librarydb"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: librarian-assistant
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/librarydb
      SPRING_DATASOURCE_USERNAME: libraryuser
      SPRING_DATASOURCE_PASSWORD: library123
      APP_JWT_SECRET: 3f5h8k2m4n6p9r1t3v5x7z0a2c4e6g8j0l2n4q6s8u0w2y4A6C8E0G2I4K6M8O0Q
      APP_JWT_EXPIRATION_MS: 86400000
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

volumes:
  library_pgdata:
