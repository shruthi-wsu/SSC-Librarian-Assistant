spring.application.name=Librarian Assistant

# ── PostgreSQL Database ───────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5434/librarydb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=libraryuser
spring.datasource.password=library123

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=3f5h8k2m4n6p9r1t3v5x7z0a2c4e6g8j0l2n4q6s8u0w2y4A6C8E0G2I4K6M8O0Q
app.jwt.expiration-ms=86400000

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8081

# ── SpringDoc / Swagger UI ────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
